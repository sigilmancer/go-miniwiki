<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Edit {{.Title}}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='50%' x='50%' dominant-baseline='middle' text-anchor='middle' font-size='60'>📄</text></svg>">
 <link rel="stylesheet" href="/style.css">
 <style>
  body {
    font-family: system-ui, sans-serif;
    margin: 2rem;
  }

  textarea {
    width: 100%;
    height: 60vh;
    font-family: ui-monospace, monospace;
    padding: 1rem;
    border: 1px solid #ccc;
    border-radius: 6px;
    box-sizing: border-box;
    background-color: #f9f9f9;
  }

  .actions {
    margin-top: 1rem;
  }
</style>

</head>
<body>
  <h1>Edit {{.Title}}</h1>
  <form action="/save/{{.Title}}" method="POST">
    <label for="body">Content</label>

    <textarea id="body" name="body">{{printf "%s" .Body}}</textarea>
    <div class="actions">
      <button type="submit">Save</button>
      <button type="button" onclick="window.location.href='/'">Cancel</button>
    </div>
  </form>
</body>
</html>
